name: Api Contracts

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "services/api/**"
      - "modules/**"
      - "packages/shared-types/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vercent/api-service build
      - run: pnpm --filter @vercent/api-service test
