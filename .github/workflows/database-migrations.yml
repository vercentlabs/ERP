name: Database Migrations

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "database/**"
      - "scripts/db/**"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vercent/api-service build
